# MCP Install Mapping Rules
# This file defines how .ai/ sources are mapped to supported AI CLI configurations.

version: 0.2
description: Mapping rules for Codex, Claude Code, and Gemini CLI integration

source_sections:
  spec: .ai/spec/
  agents: .ai/agents/
  skills: .ai/skills/
  validators: .ai/validators/
  workflows: .ai/workflows/
  templates: .ai/templates/
  rules: .ai/rules/rules.md

tools:
  claude_code:
    enabled: true
    output_path: CLAUDE.md
    template: .ai/install/templates/claude_template.md
    source_sections:
      - .ai/rules/rules.md
      - .ai/agents/
      - .ai/skills/
      - .ai/validators/
      - .ai/workflows/
    description: "Claude Code root adapter"

  codex:
    enabled: true
    output_path: AGENTS.md
    template: null
    source_sections:
      - .ai/rules/rules.md
    description: "Codex root adapter"

  gemini_cli:
    enabled: true
    output_path: GEMINI.md
    template: null
    source_sections:
      - .ai/rules/rules.md
    description: "Gemini CLI root adapter"

generated_file_header:
  enabled: true
  format: markdown
  content: |
    ==================================================
    Auto-Generated File
    ==================================================
    Generated by: mcp install
    Generated at: {{timestamp}}
    Source: .ai/install/mapping_rules.yaml
    Version: {{version}}

    WARNING: Do NOT manually edit generated files.
    Edit `.ai/rules/rules.md` and regenerate adapters instead.

    ==================================================
